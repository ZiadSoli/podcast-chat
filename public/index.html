<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </span>
      <div>
        <h1>Podcast Chat</h1>
        <p>Search episodes &rarr; build a knowledge base &rarr; chat</p>
      </div>
    </div>
    <div class="header-right">
      <div id="apiStatus" class="api-status"></div>
      <div class="user-info">
        <span id="userEmail" class="user-email"></span>
        <button id="logoutBtn" class="btn-logout">Sign out</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- ── LEFT: Search ──────────────────────────────── -->
    <section class="panel" id="searchPanel">
      <div class="panel-header">
        <h2>Search Episodes</h2>
      </div>

      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="Search podcasts &amp; episodes..."
          autocomplete="off"
        />
        <button id="searchBtn" class="btn-primary">Search</button>
      </div>

      <div id="searchResults" class="scroll-area">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>Search for podcast episodes above</p>
        </div>
      </div>
    </section>

    <!-- ── MIDDLE: Knowledge Base ────────────────────── -->
    <section class="panel" id="kbPanel">
      <div class="panel-header">
        <h2>Knowledge Base</h2>
        <span id="kbBadge" class="badge">0</span>
      </div>

      <div id="kbList" class="scroll-area">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          <p>Add episodes from the search results</p>
        </div>
      </div>

      <div id="kbFooter" class="kb-footer hidden">
        <button id="clearKbBtn" class="btn-ghost btn-sm">Clear all</button>
      </div>
    </section>

    <!-- ── RIGHT: Chat ───────────────────────────────── -->
    <section class="panel chat-panel" id="chatPanel">
      <div class="panel-header">
        <h2>Chat</h2>
        <button id="clearChatBtn" class="btn-ghost btn-sm">Clear</button>
      </div>

      <div id="chatMessages" class="chat-messages scroll-area">
        <div class="message assistant-message">
          <div class="message-content">
            Add podcast episodes to your knowledge base on the left, then ask me anything about them.
          </div>
        </div>
      </div>

      <div class="chat-input-row">
        <textarea
          id="chatInput"
          rows="1"
          placeholder="Ask a question about the episodes..."
        ></textarea>
        <button id="sendBtn" class="btn-primary send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </section>

  </div>

  <!-- ── Mobile bottom tab bar ──────────────────────── -->
  <nav class="mobile-tabs" id="mobileTabs">
    <button class="tab-btn" data-panel="searchPanel">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="tab-label">Search</span>
    </button>
    <button class="tab-btn" data-panel="kbPanel">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
      <span class="tab-label">Knowledge Base</span>
      <span id="mobileKbBadge" class="tab-badge hidden">0</span>
    </button>
    <button class="tab-btn" data-panel="chatPanel">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="tab-label">Chat</span>
    </button>
  </nav>

  <script type="module" src="js/main.js"></script>
</body>
</html>
